<div class="login-container">
  <div class="login-box">
    <h1 class="login-title">MVP Proyecto</h1>
    <p class="login-subtitle">Ingresa tus credenciales</p>
    
    <form #form="ngForm" (ngSubmit)="login()" class="login-form">
      <div class="form-group">
        <label for="username" class="form-label">Usuario:</label>
        <input
          id="username"
          type="text"
          name="username"
          [(ngModel)]="username"
          (ngModelChange)="setUsername($event)"
          class="form-input"
          placeholder="admin o user"
          required
        />
      </div>

      <div *ngIf="error()" class="error-message">
        {{ error() }}
      </div>

      <button 
        type="submit" 
        [disabled]="!form.valid"
        class="login-btn"
      >
        Ingresar
      </button>

      <div class="demo-info">
        <p><strong>Usuarios válidos:</strong></p>
        <p><code>admin</code> - Acceso total a todas las opciones</p>
        <p><code>user</code> - Acceso limitado (primeras 3 opciones)</p>
        <p style="margin-top: 0.5rem; font-size: 0.8rem; color: #666;">
          ⚠️ Solo estos dos usuarios son válidos
        </p>
      </div>
    </form>
  </div>
</div>
